<div class="contact-page">
  <div class="page-header">
    <div class="container">
      <h1 class="page-title">Contact Us</h1>
      <p class="page-subtitle">We'd love to hear from you</p>
    </div>
  </div>

  <div class="container section">
    <div class="contact-layout">
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Have a question or need assistance? Our team is here to help.</p>

        <div class="info-item">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          <div>
            <h4>Address</h4>
            <p>123 Elegance Street, Fashion District<br>New York, NY 10001</p>
          </div>
        </div>

        <div class="info-item">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <div>
            <h4>Phone</h4>
            <p>+1 (555) 123-4567</p>
          </div>
        </div>

        <div class="info-item">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <div>
            <h4>Email</h4>
            <p>contact&#64;elegance.com</p>
          </div>
        </div>
      </div>

      <form class="contact-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input
            type="text"
            title="Form Data"
            [(ngModel)]="formData.name"
            name="name"
            class="form-control"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
          title="Form Data"
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            class="form-control"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Subject</label>
          <input
            title="Form Data"
            type="text"
            [(ngModel)]="formData.subject"
            name="subject"
            class="form-control"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea
          title="Form Data"
            [(ngModel)]="formData.message"
            name="message"
            class="form-control"
            rows="6"
            required
          ></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</div>
