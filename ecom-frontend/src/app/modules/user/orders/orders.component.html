<div class="container section">
      <div class="user-layout">
        <aside class="user-sidebar">
          <h3>Your Account</h3>
          <ul>
            <li><a routerLink="/user/profile" routerLinkActive="active">Profile</a></li>
            <li><a routerLink="/user/orders" routerLinkActive="active">Order History</a></li>
          </ul>
        </aside>

        <main class="user-content">
          <h1>Order History</h1>
          
          <div class="orders-list">
            <div class="order-card fade-in" *ngFor="let order of orders">
              <div class="order-header">
                <div>
                  <span class="order-id">Order #{{ order._id.slice(-8) }}</span>
                  <span class="order-date">{{ order.createdAt | date:'mediumDate' }}</span>
                </div>
                <span class="status-badge" [attr.data-status]="order.status">{{ order.status }}</span>
              </div>
              <div class="order-body">
                <div class="order-items">
                  <div class="item" *ngFor="let item of order.items">
                    {{ item.quantity }}x {{ item.product.name }}
                  </div>
                </div>
                <div class="order-meta">
                  <div class="total-amount">{{ order.totalAmount | currency }}</div>
                  <button class="btn-refund" *ngIf="order.status === 'delivered'" [routerLink]="['/user/refund', order._id]">Request Refund</button>
                </div>
              </div>
            </div>



            <div class="empty-state-wrapper" *ngIf="orders.length === 0 && !loading">
              <app-empty-state
                title="No orders yet"
                message="You haven't placed any orders yet. Start exploring our collection."
                icon="bi-box-seam"
                buttonText="Start Shopping"
                buttonLink="/products">
              </app-empty-state>
            </div>
          </div>
        </main>
      </div>
    </div>
