 <div class="container section">
      <div class="user-layout">
        <aside class="user-sidebar">
          <h3>Your Account</h3>
          <ul>
            <li><a routerLink="/user/profile" routerLinkActive="active">Profile</a></li>
            <li><a routerLink="/user/orders" routerLinkActive="active">Order History</a></li>
          </ul>
        </aside>

        <main class="user-content">
          <h1>Profile Detail</h1>
          <div class="profile-card fade-in" *ngIf="user">
            <div class="profile-header">
               <div class="avatar">{{ user.name.charAt(0) }}</div>
               <div>
                 <h2>{{ user.name }}</h2>
                 <p>{{ user.email }}</p>
               </div>
            </div>
            <div class="profile-info">
               <div class="info-group">
                 <label>Organization ID</label>
                 <span>{{ user.organizationId }}</span>
               </div>
               <div class="info-group">
                 <label>Member Since</label>
                 <span>{{ user.createdAt | date }}</span>
               </div>
            </div>
          </div>
        </main>
      </div>
    </div>
