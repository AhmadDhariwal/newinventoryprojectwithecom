    <div class="auth-container">
      <div class="auth-card fade-in">
        <h1>Register</h1>
        <p>Join the StockEcom community</p>

        <form [formGroup]="regForm" (ngSubmit)="onRegister()">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" formControlName="name" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="••••••••">
          </div>
          
          <button type="submit" class="btn-primary" [disabled]="submitting">
            {{ submitting ? 'Creating Account...' : 'Register' }}
          </button>
          
          <p class="error-msg" *ngIf="error">{{ error }}</p>

          <p class="switch-auth">
            Already have an account? <a routerLink="/auth/login">Login here</a>
          </p>
        </form>
      </div>
    </div>
