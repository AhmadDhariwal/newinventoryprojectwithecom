<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <!-- Mobile Menu Button -->
      <button title="toggle menu" class="icon-btn mobile-menu-btn" (click)="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <!-- Logo -->
      <a routerLink="/" class="logo">
        <span class="logo-text">ELEGANCE</span>
      </a>

      <!-- Desktop Menu -->
      <div class="nav-center">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/products" routerLinkActive="active">Collection</a>
        <a routerLink="/about" routerLinkActive="active">Story</a>
        <a routerLink="/contact" routerLinkActive="active">Contact</a>
      </div>

      <!-- Mobile Sidebar -->
      <app-sidebar [isOpen]="showMenu" (close)="toggleMenu()"></app-sidebar>

      <!-- Actions -->
      <div class="nav-actions">
        <button class="icon-btn search-btn" (click)="toggleSearch()" title="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        
        <ng-container *ngIf="authService.currentUser$ | async as user; else guestLinks">
          <a routerLink="/user/profile" class="icon-btn" title="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </a>
        </ng-container>
        <ng-template #guestLinks>
          <a routerLink="/auth/login" class="icon-btn" title="Login">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
               <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
               <polyline points="10 17 15 12 10 7"/>
               <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </a>
        </ng-template>

        <a routerLink="/cart" class="icon-btn cart-btn" title="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="cart-count" *ngIf="(cartService.cartItems$ | async)?.length as count">
            {{ count }}
          </span>
        </a>
      </div>
    </div>
  </div>
  
  <!-- Search Overlay -->
  <div class="search-overlay" *ngIf="showSearch" (click)="toggleSearch()">
    <div class="search-container" (click)="$event.stopPropagation()">
      <button class="search-close" (click)="toggleSearch()">&times;</button>
      <input 
        type="text" 
        class="search-input"
        [(ngModel)]="searchQuery"
        (keyup.enter)="performSearch()"
        placeholder="Type to search..."
        autofocus>
    </div>
  </div>
</nav>
