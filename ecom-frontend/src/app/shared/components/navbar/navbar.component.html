<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <a routerLink="/" class="logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text">ELEGANCE</span>
        <span class="logo-badge">SHOP</span>
      </a>

      <div class="nav-center">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/products" routerLinkActive="active">Shop</a>
        <a routerLink="/about">About</a>
        <a routerLink="/contact">Contact</a>
      </div>

      <div class="nav-actions">
        <button class="icon-btn" title="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        
        <ng-container *ngIf="authService.currentUser$ | async as user; else guestLinks">
          <a routerLink="/user/profile" class="icon-btn" title="Profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </a>
        </ng-container>
        <ng-template #guestLinks>
          <a routerLink="/auth/login" class="icon-btn" title="Login">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </a>
        </ng-template>

        <a routerLink="/cart" class="icon-btn cart-btn" title="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-count" *ngIf="(cartService.cartItems$ | async)?.length">
            {{ (cartService.cartItems$ | async)?.length }}
          </span>
        </a>
      </div>
    </div>
  </div>
</nav>
