<div class="product-card">
  <div class="product-image-wrapper" [routerLink]="['/products', product._id]">
    <img 
      class="product-image" 
      [src]="getProductImage()" 
      [alt]="product.name"
    >
    <div class="product-overlay" *ngIf="product.inStock">
      <button 
        (click)="addToCart($event)" 
        class="btn-quick-add"
        aria-label="Add to cart"
      >
        Add to Cart
      </button>
    </div>
    <div class="product-badge" *ngIf="!product.inStock">Sold Out</div>
    <div class="product-badge sale-badge" *ngIf="product.inStock && product.discountPercentage">
      -{{ product.discountPercentage }}%
    </div>
  </div>
  <div class="product-info">
    <div class="product-meta">
      <span class="product-category">{{ product.category?.name }}</span>
    </div>
    <h3 class="product-name" [routerLink]="['/products', product._id]">{{ product.name }}</h3>
    <div class="product-price-wrapper">
      <span class="product-price" [class.discounted]="product.discountPrice">
        {{ (product.discountPrice || product.price) | currency }}
      </span>
      <span class="product-old-price" *ngIf="product.discountPrice">
        {{ product.price | currency }}
      </span>
    </div>
  </div>

</div>
