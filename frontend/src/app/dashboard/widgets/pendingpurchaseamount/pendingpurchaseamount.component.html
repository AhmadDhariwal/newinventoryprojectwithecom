<div class="widget-card pending-amount-widget">
  <div class="widget-header">
    <div class="widget-icon">
      <i class="fas fa-clock" aria-hidden="true"></i>
    </div>
    <div class="widget-info">
      <h3 class="widget-title">Pending Purchases</h3>
      <p class="widget-value">{{ amount | currency:'USD':'symbol':'1.2-2' }}</p>
    </div>
  </div>
  <div class="widget-footer">
    <span class="widget-label">Value of orders awaiting approval</span>
  </div>
</div>
