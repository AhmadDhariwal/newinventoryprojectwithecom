<div class="widget-card approved-amount-widget">
  <div class="widget-header">
    <div class="widget-icon">
      <i class="fas fa-file-invoice-dollar" aria-hidden="true"></i>
    </div>
    <div class="widget-info">
      <h3 class="widget-title">Approved Purchases</h3>
      <p class="widget-value">{{ amount | currency:'USD':'symbol':'1.2-2' }}</p>
    </div>
  </div>
  <div class="widget-footer">
    <span class="widget-label">Total value of received orders</span>
  </div>
</div>
